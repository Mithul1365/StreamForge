<!DOCTYPE html>

<html>

<head>

    <title>StreamForge Healthcare Dashboard</title>

    <link rel="stylesheet"
    href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>
🏥 StreamForge Healthcare Dashboard
</h1>

<div id="alertBanner" class="banner">

🚨 CRITICAL PATIENT DETECTED

</div>

<div class="cards">

<div class="card">

<h2>Total</h2>

<h1 id="total">0</h1>

</div>

<div class="card">

<h2>Normal</h2>

<h1 id="normal">0</h1>

</div>

<div class="card">

<h2>Critical</h2>

<h1 id="critical">0</h1>

</div>

<div class="card">

<h2>Updated</h2>

<h1 id="updated">--</h1>

</div>

</div>

<table>

<thead>

<tr>

<th>Patient</th>

<th>Heart Rate</th>

<th>SpO₂</th>

<th>BP</th>

<th>Temperature</th>

<th>Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script src="/static/script.js"></script>

</body>

</html>
